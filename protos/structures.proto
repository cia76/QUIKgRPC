  float start_discount = 33; // Начальный дисконт, в %
  string reject_reason = 34; // Причина отклонения заявки брокером
  int32 ext_order_flags = 35; // Битовое поле для получения специфических параметров с западных площадок
  int32 min_qty = 36; // Минимально допустимое количество, которое можно указать в заявке по данному инструменту. Если имеет значение 0, значит ограничение по количеству не задано
  // Тип исполнения заявки. Возможные значения:
