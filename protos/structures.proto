syntax = "proto3";

package functions;

option csharp_namespace = "QuikGrpc";

// Справочники

// 3.10.4 Временной интервал
enum TimeFrame {
    NONE = 0; // Не использовать
    M1 = 1; // 1 минута
    M2 = 2; // 2 минуты
    M3 = 3; // 3 минуты
    M4 = 4; // 4 минуты
    M5 = 5; // 5 минут
    M6 = 6; // 6 минут
    M10 = 10; // 10 минут
    M15 = 15; // 15 минут
    M20 = 20; // 20 минут
    M30 = 30; // 30 минут
    M60 = 60; // 1 час
    M120 = 120; // 2 часа
    M240 = 240; // 4 часа
    D1 = 1440; // 1 день
    W1 = 10080; // 1 неделя
    MN1 = 23200; // 1 месяц
}

// Базовые Структуры

// Пустое значение
message Empty {}

// Логическое значение
message QuikBool {
  bool value = 1;
}

// Логические значения
message QuikBools {
  repeated bool value = 1; // Логическое значение
}

// Целое число
message QuikInt {
  int32 value = 1;
}

// Строка
message QuikString {
  string value = 1;
}

// Строки
message QuikStrings {
  repeated string value = 1; // Строка
}

// Режим торгов и инструмент
message ClassSecCode {

    string class_code = 1; // Режим торгов
    string sec_code = 2; // Код инструмента
}

// 3.3.1 Денежная позиция
message MoneyPosition {
  float money_open_limit = 1; // Входящий лимит по денежным средствам
  float money_limit_locked_nonmarginal_value = 2; // Стоимость немаржинальных инструментов в заявках на покупку
  float money_limit_locked = 3; // Заблокированное в заявках на покупку количество денежных средств
  float money_open_balance = 4; // Входящий остаток по денежным средствам
  float money_current_limit = 5; // Текущий лимит по денежным средствам
  float money_current_balance = 6; //Текущий остаток по денежным средствам
  float money_limit_available = 7; // Доступное количество денежных средств
}

// 3.3.1 Денежные позиции
message MoneyPositions {
  repeated MoneyPosition money_position = 1; // Строка таблицы денежных позиций
}

// 3.4.1 Позиция по инструменту
message SecPosition {
  float depo_limit_locked_buy_value = 1; // Стоимость инструментов, заблокированных на покупку
  float depo_current_balance = 2; // Текущий остаток по инструментам
  int32 depo_limit_locked_buy = 3; // Количество лотов инструментов, заблокированных на покупку
  int32 depo_limit_locked = 4; // Заблокированное Количество лотов инструментов
  int32 depo_limit_available = 5; // Доступное количество инструментов
  float depo_current_limit = 6; // Текущий лимит по инструментам
  float depo_open_balance = 7; // Входящий остаток по инструментам
  float depo_open_limit = 8; // Входящий лимит по инструментам
}

// 3.4.1 Позиции по инструменту
message SecPositions {
  repeated SecPosition sec_position = 1; // Позиция по инструменту
}

// 3.9.1 Стакан
message Quote {
  string class_code = 1; // Режим торгов
  string sec_code = 2; // инструмент
  string server_time = 3; // Время сервера МСК
  int32 bid_count = 4; // Количество котировок покупки. При отсутствии спроса возвращается значение 0
  repeated BidOffer bid = 5; // Котировки спроса (покупки). При отсутствии спроса возвращается пустая строка
  int32 offer_count = 6; // Количество котировок продажи. При отсутствии предложения возвращается значение 0
  repeated BidOffer offer = 7; // Котировки предложений (продажи). При отсутствии предложения возвращается пустая строка
}

// 3.9.1 Котировка спроса (покупки) / предложения (продажи) в стакане
message BidOffer {
  float price = 1; // Цена покупки / продажи
  int32 quantity = 2; // Количество в лотах
}

// QUIK# Свечка
message Candle {
  string class = 1; // Режим торгов
  string sec = 2; // Инструмент
  TimeFrame interval = 3; // Временной интервал в минутах
  float open = 4; // Цена открытия
  float high = 5; // Максимальная цена
  float low = 6; // Минимальная цена
  float close = 7; // Цена закрытия
  int32 volume = 8; // Объем
  DateTime datetime = 9; // Дата и время начала свечки
}

// QUIK# свечки
message Candles {
  repeated Candle candle = 1; // Свечка
}

// 4. Структуры данных

// 4.1 Режим торгов
message Class {
  string firmid = 1; // Идентификатор фирмы
  string name = 2; // Название режима торгов
  string code = 3; // Код режима торгов
  int32 npars = 4; // Количество параметров в режиме торгов
  int32 nsecs = 5; // Количество инструментов в режиме торгов
}

// 4.2 Фирма
message Firm {
  string firmid = 1; // Идентификатор фирмы
  string firm_name = 2; // Название фирмы
  int32 status = 3; // Статус
  string exchange = 4; // Торговая площадка
}

// 4.3 Обезличенная сделка
message AllTrade {
  uint64 trade_num = 1; // Номер сделки
  int32 flags = 2; // Набор битовых флагов. 1025 - Сделка на продажу, 1026 - Сделка на покупку
  float price = 3; // Цена
  int32 qty = 4; // Количество
  float value = 5; // Объем сделки
  float accruedint = 6; // Накопленный купонный доход
  float yield = 7; // Доходность
  string settlecode = 8; // Код расчетов
  float reporate = 9; // Ставка РЕПО
  float repovalue = 10; // Сумма РЕПО
  float repo2value = 11; // Объем сделки выкупа РЕПО
  int32 repoterm = 12; // Срок РЕПО в днях
  string sec_code = 13; // Инструмент
  string class_code = 14; // Режим торгов
  DateTime datetime = 15; // Дата и время
  int32 period = 16; // Период торговой сессии. Возможные значения: 0 – Открытие, 1 – Нормальный, 2 – Закрытие
  int32 open_interest = 17; // Открытый интерес
  string exchange_code = 18; // Код биржи в торговой системе
  string exec_market = 19; // Площадка исполнения
  string benchmark = 20; // Идентификатор индикативной ставки
}

// Обезличенные сделки
message AllTrades {
  repeated AllTrade all_trade = 1; // Обезличенная сделка
}

// 4.4 Сделка
message Trade {
  uint64 trade_num = 1; // Номер сделки в торговой системе
  uint64 order_num = 2; // Номер заявки в торговой системе
  string brokerref = 3; // Комментарий, обычно: <код клиента>/<номер поручения>
  string userid = 4; // Идентификатор трейдера
  string firmid = 5; // Идентификатор фирмы
  int32 canceled_uid = 6; // Идентификатор пользователя, отказавшегося от сделки
  string account = 7; // Торговый счет
  float price = 8; // Цена
  int32 qty = 9; // Количество инструментов в лотах
  float value = 10; // Объем в денежных средствах
  float accruedint = 11; // Накопленный купонный доход
  float yield = 12; // Доходность
  string settlecode = 13; // Код расчетов
  string cpfirmid = 14; // Идентификатор фирмы партнера
  // 5.2 Набор битовых флагов
  // бит 0 (0x1) Маржинальная сделка. бит 2 (0x4) Сделка на продажу, иначе – на покупку. бит 3 (0x8) Сделка по айсберг-заявке. бит 4 (0x10) Отмененная сделка (Состояние = "О"), поле canceled_datetime заполняется датой и временем отмены сделки
  // бит 5 (0x20) Пассивная сделка (Состояние = "П"). бит 6 (0x40) Активная сделка (Состояние — "А"). бит 7 (0x80) Первая часть операции своп. бит 8 (0x100) Вторая часть операции своп
  int32 flags = 15;
  float price2 = 16; // Цена выкупа
  float reporate = 17; // Ставка РЕПО (%)
  string client_code = 18; // Код клиента
  float accrued2 = 19; // Доход (%) на дату выкупа
  int32 repoterm = 20; // Срок РЕПО, в календарных днях
  float repovalue = 21; // Сумма РЕПО
  float repo2value = 22; // Объем выкупа РЕПО
  float start_discount = 23; // Начальный дисконт (%)
  float lower_discount = 24; // Нижний дисконт (%)
  float upper_discount = 25; // Верхний дисконт (%)
  int32 block_securities = 26; // Блокировка обеспечения (Да/Нет)
  float clearing_comission = 27; // Клиринговая комиссия биржи
  float exchange_comission = 28; // Комиссия Фондовой биржи
  float tech_center_comission = 29; // Комиссия Технического центра
  int32 settle_date = 30; // Дата расчетов
  string settle_currency = 31; //Валюта расчетов
  string trade_currency = 32; // Валюта
  string exchange_code = 33; // Код биржи в торговой системе
  string station_id = 34; // Идентификатор рабочей станции
  string sec_code = 35; // Инструмент
  string class_code = 36; // Режим торгов
  DateTime datetime = 37; // Дата и время
  string bank_acc_id = 38; // Идентификатор расчетного счета/кода в клиринговой организации
  float broker_comission = 39; // Комиссия брокера. Отображается с точностью до 2-х знаков. Поле зарезервировано для будущего использования
  uint64 linked_trade = 40; // Номер витринной сделки в торговой системе для сделок РЕПО с ЦК и SWAP  
  int32 period = 41; // Период торговой сессии. Возможные значения:  0 – Открытие; 1 – Нормальный; 2 – Закрытие
  uint64 trans_id = 42; // Идентификатор транзакции
  // Тип сделки. Возможные значения:
  // 1 – Обычная; 2 – Адресная; 3 – Первичное размещение;
  // 4 – Перевод денег/инструментов; 5 – Адресная сделка первой части РЕПО; 6 – Расчетная по операции своп;
  // 7 – Расчетная по внебиржевой операции своп; 8 – Расчетная сделка бивалютной корзины; 9 – Расчетная внебиржевая сделка бивалютной корзины;
  // 10 – Сделка по операции РЕПО с ЦК; 11 – Первая часть сделки по операции РЕПО с ЦК; 12 – Вторая часть сделки по операции РЕПО с ЦК;
  // 13 – Адресная сделка по операции РЕПО с ЦК; 14 – Первая часть адресной сделки по операции РЕПО с ЦК; 15 – Вторая часть адресной сделки по операции РЕПО с ЦК;
  // 16 – Техническая сделка по возврату активов РЕПО с ЦК; 17 – Сделка по спреду между фьючерсами разных сроков на один актив; 18 – Техническая сделка первой части от спреда между фьючерсами;
  // 19 – Техническая сделка второй части от спреда между фьючерсами; 20 – Адресная сделка первой части РЕПО с корзиной; 21 – Адресная сделка второй части РЕПО с корзиной;
  // 22 – Перенос позиций срочного рынка; 23 – Late correction-XLON; 24 – Not to mark-XLON;
  // 25 – Previous Day Contra; 26 – Ordinary trade immediate publication – XLON; 27 – Inter Fund Transfer delayed publication – XOFF;
  // 28 – Negotiated trade delayed publication – XLON; 29 – Negotiated Trade immediate publication – XLON; 30 – OTC Late Correction – XOFF;
  // 31 – Ordinary Trade delayed publication – XLON; 32 – Ordinary Trade Immediate publication – XOFF; 33 – Sl Late Correction;
  // 34 – Sl Trade immediate publication; 35 – Sl Trade delayed publication; 36 – OTC trade delayed publication – XOFF;
  // 37 – OTC MTF TBA 1; 38 – OTC trade – delayed publication – XOFF; 39 – Inter fund cross – delayed publication requested MTF TBA 1;
  // 40 – Cancellation of OTC trade after date of publication MTF TBA 2; 41 – OTC MTF TBA 1; 42 – OTC Trade – delayed publication MTF TBA 2;
  // 43 – Inter fund cross – delayed publication requested MTF TBA 2; 44 – Cancellation of OTC trade after date of publication MTF TBA 2; 45 – OTC MTF TBA 3;
  // 46 – OTC trade – delayed publication MTF TBA 3; 47 – Inter fund cross – delayed publication requested MTF TBA 3; 48 – Cancellation of OTC trade after date of publication MTF TBA 3;
  // 49 – OTC MTF TBA 4; 50 – OTC trade – delayed publication MTF TBA 4; 51 – Inter fund cross – delayed publication requested MTF TBA 4;
  // 52 – Cancellation of OTC trade after date of publication MTF TBA 4; 53 – Delayed Publication Late Correction XLON; 54 – No to Mark Late Correction XLON;
  // 55 – Витринная сделка по операции своп;
  // 58 – Витринная сделка по адресной операции воп; 59 – Витринная сделка по Беспоставочному свопу; 60 – Сделка FX SPOT;
  // 61 – Сделка по Беспоставочному валютному форвардному контракту; 62 – Сделка FX DEPOSIT; 63 – Сделка по Валютному расчетному форвардному контракту;
  // 67 – Обратная EES-сделка; 68 – Прямая обеспеченаая EESсделка; 69 – Прямая необеспеченная EESсделка;
  // 70 – Прямая смешанная EES-сделка; 71 – Исполнение фьючерсов; 72 – Исполнение опциона;
  // 73 – Истечение опциона; 74 – Техническая (предварительная) сделка с провайдером ликвидности; 75 – Сделка вследствие добровольного выхода из вечного фьючерса (на основании поданной заявки);
  // 76 – Сделка вследствие принудительного выхода из вечного фьючерса (реализация неудовлетворенного спроса); 77 – Сделка в свяазнном инструменте вследствие выхода из вечного фьючерса
  int32 kind = 43;
  string clearing_bank_accid = 44; // Идентификатор счета в НКЦ (расчетный код)
  DateTime canceled_datetime = 45; // Дата и время снятия сделки
  string clearing_firmid = 46; // Идентификатор фирмы - участника клиринга
  string system_ref = 47; // Дополнительная информация по сделке, передаваемая торговой системой
  int32 uid = 48; // Идентификатор пользователя на сервере QUIK
  string lseccode = 49; // Приоритетное обеспечение
  uint64 order_revision_number = 50; //Номер ревизии заявки, по которой была совершена сделка
  int32 order_qty = 51; // Количество в заявке на момент совершения сделки, в лотах
  float order_price = 52; // Цена в заявке на момент совершения сделки
  string order_exchange_code = 53; // Биржевой номер заявки
  string exec_market = 54; // Площадка исполнения
  int32 liquidity_indicator = 55; // Индикатор ликвидности. Возможные значения: 0 – не определено; 1 – по заявке мейкера; 2 – по заявке тейкера; 3 – вывод ликвидности; 4 – по заявке в период аукциона
  string extref = 56; // Внешняя ссылка, используется для обратной связи с внешними системами
  int32 ext_trade_flags = 57; // Расширенные флаги, полученные от шлюза напрямую, без вмешательства сервера QUIK. Поле не заполняется
  int32 on_behalf_of_uid = 58; //UID пользователя, от имени которого совершена сделка
  int32 client_qualifier = 59; // Квалификатор клиента, от имени которого совершена сделка. Возможные значения: 0 – не определено; 1 – Natural Person; 3 – Legal Entity 
  int32 client_short_code = 60; // Краткий идентификатор клиента, от имени которого совершена сделка
  int32 investment_decision_maker_qualifier = 61; // Квалификатор принявшего решение о совершении сделки. Возможные значения: 0 – не определено; 1 – Natural Person; 2 – Algorithm
  int32 investment_decision_maker_short_code = 62; // Краткий идентификатор принявшего решение о совершении сделки
  int32 executing_trader_qualifier = 63; // Квалификатор трейдера, исполнившего заявку, по которой совершена сделка. Возможные значения: 0 – не определено; 1 – Natural Person; 2 – Algorithm
  int32 executing_trader_short_code = 64; // Краткий идентификатор трейдера, исполнившего заявку, по которой совершена сделка
  // Признак того, что транзакция совершена по правилам пре-трейда. Возможные значения битовых флагов:
  // бит 0 (0x1) – RFPT; бит 1 (0x2) – NLIQ; бит 2 (0x4) – OILQ; бит 3 (0x8) – PRC; бит 4 (0x10)– SIZE; бит 5 (0x20) – ILQD
  int32 waiver_flag = 65;
  int32 mleg_base_sid = 66; // Идентификатор базового инструмента на сервере для multileg-инструментов
  int32 side_qualifier = 67; // Квалификатор операции. Возможные значения: 0 – не определено; 1 – Buy; 2 – Sell; 3 – Sell short; 4 – Sell short exempt; 5 – Sell undiclosed
  // OTC post-trade индикатор. Возможные значения битовых флагов:
  // бит 0 (0x1) – Benchmark; бит 1 (0x2) – Agency cross; бит 2 (0x4) – Large in scale; бит 3 (0x8) – Illiquid instrument; бит 4 (0x10) – Above specified size; бит 5 (0x20) – Cancellations;
  // бит 6 (0x40) – Amendments; бит 7 (0x80) – Special dividend; бит 8 (0x100) – Price improvement; бит 9 (0x200) – Duplicative; бит 10 (0x400) – Not contributing to the price discovery process;
  // бит 11 (0x800) – Package; бит 12 (0x1000) – Exchange for Physical
  int32 otc_post_trade_indicator = 68;
  // Роль в исполнении заявки. Возможные значения:
  // 0 – не определено; 1 – Agent; 2 – Principal; 3 – Riskless principal; 4 – CFG give up; 5 – Cross as agent;
  // 6 – Matched Principal; 7 – Proprietary; 8  – Individual; 9 – Agent for other member; 10 – Mixed; 11 – Market maker 
  int32 capacity = 69;
  int32 cross_rate = 70; // Кросс-курс валюты цены сделки к валюте расчетов по сделке
  int32 fixing_date = 71; // Дата фиксации котировки для расчетов. Заполняется для контрактов типа NDF (см. operation_type)
  int32 start_date = 72; // Дата, начиная с которой допускается совершение валютирования. Заполняется только для контрактов типа FLEX FORWARD (см. operation_type)
  int32 operation_type = 73; // Тип совершаемой операции. Возможные значения: -1 – NOT_DEFINED; 0 – SPOT; 1 – FORWARD; 2 – SWAP; 6 – NDF; 7 – FLEX FORWARD
  float spot_rate = 74; // Цена котировки по спот-инструменту в момент совершения сделки
  string ts_commission_currency = 75; // Код валюты комиссии торговой системы
  string broker_commission_currency = 76; // Код валюты комиссии брокера
  int32 trading_session = 77; // Идентификатор торговой сессии. Возможные значения: 0 – Не определено; 1 – Основная сессия; 2 – Дополнительная сессия; 3 – Итоги дня
  string benchmark = 78; // Идентификатор индикативной ставки
  int32 deposit_intent = 79; // Тип сделки депозита. Возможные значения: 0 – сделка не типа депозит; 1 – Намерение; 2 – Депозит; 3 – Изъятие; 4 – Закрытие планового пополнения; 5 – Принудительное закрытие; 6 – Перенос пополнения
  int32 open_repo2date = 80; // День Т+1 для сделок РЕПО с Открытой датой
  int32 open_repo2value = 81; // Стоимость выкупа РЕПО с открытой датой в день T+1
}

// Сделки
message Trades {
  repeated Trade trade = 1; // Сделка
}

// 4.5 Заявка
message Order {
  uint64 order_num = 1; // Номер заявки в торговой системе
  // 5.1 Набор битовых флагов
  // бит 0 (0x1) Заявка активна, иначе – не активна. бит 1 (0x2) Заявка снята. Если флаг не установлен и значение бита 0 равно 0, то заявка исполнена.
  // бит 2 (0x4) Заявка на продажу, иначе – на покупку. бит 3 (0x8) Заявка лимитированная, иначе – рыночная.
  // бит 4 (0x10) Исполнить заявку по разным ценам. бит 5 (0x20) Исполнить заявку немедленно или снять (FILL OR KILL).
  // бит 6 (0x40) Заявка маркет-мейкера. Для адресных заявок – заявка отправлена контрагенту. бит 7 (0x80) Скрытая заявка.
  // бит 8 (0x100) Снять остаток. бит 9 (0x200) Айсберг-заявка.
  // бит 10 (0x400) Заявка отклонена торговой системой. бит 20 (0x100000) Поле «linkedorder» заполняется номером стоп-заявки.
  int32 flags = 2;
  string brokerref = 3; // Комментарий, обычно: <код клиента>/<номер поручения>
  string userid = 4; // Идентификатор трейдера
  string firmid = 5; // Идентификатор фирмы
  string account = 6; // Торговый счет
  float price = 7; // Цена
