  // 8 – Individual; 9 – Agent for other member; 10 – Mixed; 11 – Market maker
  int32 capacity = 40;
  int32 passive_only_order = 41; // Поле для получения параметров по западным площадкам. Если имеет значение 0, значит значение не задано
  int32 visible = 42; // Видимое количество. Параметр айсберг-заявок, для обычных заявок выводится значение: 0.
  float awg_price = 43; // Средняя цена исполнения. Актуально, когда заявка выполнилась частями
