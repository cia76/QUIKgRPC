// 4.8 Стоп-заявка
message StopOrder {
  uint64 order_num = 1; // Регистрационный номер стоп-заявки на сервере QUIK
  int32 ordertime = 2; // Время выставления
  // 5.5 Набор битовых флагов
  // бит 0 (0x1) Заявка активна, иначе не активна.
  // бит 1 (0x2) Заявка снята. Если не установлен и значение бита 0 равно 0, то заявка исполнена.
  // бит 2 (0x4) Заявка на продажу, иначе – на покупку.
  // бит 3 (0x8) Лимитированная заявка.
  // бит 5 (0x20) Стоп-заявка ожидает активации.
  // бит 6 (0x40) Стоп-заявка с другого сервера.
  // бит 8 (0x100) Устанавливается в случае стоп-заявки типа тейк-профита по заявке, в случае когда исходная заявка частично исполнена и по выставленной тейк-профит заявке на исполненную часть заявки выполнилось условие активации.
  // бит 9 (0x200) Стоп-заявка активирована вручную.
  // бит 10 (0x400) Стоп-заявка сработала, но была отвергнута торговой системой.
  // бит 11 (0x800) Стоп-заявка сработала, но не прошла контроль лимитов.
  // бит 12 (0x1000) Стоп-заявка снята, так как снята связанная заявка.
  // бит 13 (0x2000) Стоп-заявка снята, так как связанная заявка исполнена.
  // бит 15 (0x8000) Идет расчет минимума-максимума.
  int32 flags = 3;
  string brokerref = 4; // Комментарий, обычно: <код клиента>/<номер поручения>
  string firmid = 5; // Идентификатор фирмы
  string account = 6; // Торговый счет
  int32 condition = 7; // Направленность стоп-цены. Возможные значения: 4 – <=, 5 – >=
  float condition_price = 8; // Стоп-цена
  float price = 9; // Цена
  int32 qty = 10; // Количество в лотах
  uint64 linkedorder = 11; // Номер заявки в торговой системе, зарегистрированной по наступлению условия стоп-цены
  int32 expiry = 12; // Дата окончания срока действия заявки
  uint64 trans_id = 13; // Идентификатор транзакции
  string client_code = 14; // Код клиента
  uint64 co_order_num = 15; // Связанная заявка
  float co_order_price = 16; // Цена связанной заявки
  // Вид стоп заявки. Возможные значения:
  // 1 – стоп-лимит; 2 – условие по другому инструменту; 3 – со связанной заявкой; 6 – тейк-профит;
  // 7 – стоп-лимит по исполнению активной заявки; 8» – тейк-профит по исполнению активной заявки; 9 – тейк-профит и стоп-лимит
  int32 stop_order_type = 17;
  int32 orderdate = 18; // Дата выставления
  int32 alltrade_num = 19; // Сделка условия
  // 5.6 Набор битовых флагов
  // бит 0 (0x1) Использовать остаток основной заявки. бит 1 (0x2) При частичном исполнении заявки снять стоп-заявку.
  // бит 2 (0x4) Активировать стоп-заявку при частичном исполнении связанной заявки. бит 3 (0x8) Отступ задан в процентах, иначе – в пунктах цены.
  // бит 4 (0x10) Защитный спред задан в процентах, иначе – в пунктах цены. бит 5 (0x20) Срок действия стоп-заявки ограничен сегодняшним днем.
  // бит 6 (0x40) Установлен интервал времени действия стоп-заявки. бит 7 (0x80) Выполнение тейк-профита по рыночной цене.
  // бит 8 (0x100) Выполнение стоп-заявки по рыночной цене
  int32 stopflags = 20;
  float offset = 21; // Отступ от min/max
  float spread = 22; // Защитный спред
  int32 balance = 23; // Активное количество
  int32 uid = 24; // Идентификатор пользователя
  int32 filled_qty = 25; // Исполненное количество
  int32 withdraw_time = 26; // Время снятия заявки
  float condition_price2 = 27; // Стоп-лимит цена для заявок типа Тэйк-профит и стоп-лимит
  int32 active_from_time = 28; // Время начала периода действия заявки типа Тэйк-профит и стоп-лимит
  int32 active_to_time = 29; // Время окончания периода действия заявки типа Тэйк-профит и стоп-лимит
  string sec_code = 30; // Код инструмента заявки
  string class_code = 31; // Код режима торгов заявки
  string condition_sec_code = 32; // Код инструмента стоп-цены
  string condition_class_code = 33; // Код режима торгов стоп-цены
  int32 canceled_uid = 34; // Идентификатор пользователя, снявшего стоп-заявку
  DateTime order_date_time = 35; // Время выставления стоп-заявки
  DateTime withdraw_datetime = 36; // Время снятия стоп-заявки
  DateTime activation_date_time = 37; // Дата и время активации стоп-заявки
}

// Стоп-заявки
message StopOrders {
  repeated StopOrder stop_order = 1; // Стоп-заявка
}

// 4.9 Ограничение по клиентским счетам
message FuturesLimit {
  string firmid = 1; // Идентификатор фирмы
  string trdaccid = 2; // Торговый счет
  // Тип лимита. Возможные значения:
  // 0 – Денежные средства; 1 – Залоговые денежные средства; 2 – По совокупным средствам; 3 – Клиринговые денежные средства; 4 – Клиринговые залоговые денежные средства;
  // 5 – Лимит открытых позиций на спотрынке; 6 – Суммарные залоговые средства в иностранной валюте (в рублях); 7 – Залоговые средства в иностранной валюте
  int32 limit_type = 3;
  float liquidity_coef = 4; // Коэффициент ликвидности
  float cbp_prev_limit = 5; // Предыдущий лимит открытых позиций
  float cbplimit = 6; // Лимит открытых позиций
  float cbplused = 7; // Текущие чистые позиции
  float cbplplanned = 8; // Плановые чистые позиции
  float varmargin = 9; // Вариационная маржа
  float accruedint = 10; // Накопленный доход
  float cbplused_for_orders = 11; // Текущие чистые позиции (под заявки)
  float cbplused_for_positions = 12; // Текущие чистые позиции (под открытые позиции)
  float options_premium = 13; // Премия по опционам
  float ts_comission = 14; // Биржевые сборы
  float kgo = 15; // Коэффициент клиентского гарантийного обеспечения
  string currcode = 16; // Валюта, в которой транслируется ограничение. SUR - Рубль
  // Реально начисленная в ходе клиринга вариационная маржа. Отображается с точностью до 2 двух знаков
  // При этом поле varmargin транслируется вариационная маржа, рассчитанная с учетом установленных границ изменения цены
  float real_varmargin = 17;
}

// Ограничения по клиентским счетам
message FuturesLimits {
  repeated FuturesLimit futures_limit = 1; // Ограничение по клиентским счетам
}

// 4.10 Позиция по клиентским счетам (фьючерсы)
message FuturesClientHolding {
  string firmid = 1; // Идентификатор фирмы
  string trdaccid = 2; // Торговый счет
  string sec_code = 3; // Код фьючерсного контракта
  int32 limit_type = 4; //Тип лимита. Возможные значения: 0 – Не определён; 1 – Основной счет; 2 – Клиентские и дополнительные счета; 4 – Все счета торговых членов
  float startbuy = 5; // Входящие длинные позиции
  float startsell = 6; // Входящие короткие позиции
  float startnet = 7; // Входящие чистые позиции
  float todaybuy = 8; // Текущие длинные позиции
  float todaysell = 9; // Текущие короткие позиции
  float totalnet = 10; // Текущие чистые позиции
  float openbuys = 11; // Активные на покупку
  float opensells = 12; // Активные на продажу
  float cbplused = 13; // Оценка текущих чистых позиций
  float cbplplanned = 14; // Плановые чистые позиции
  float varmargin = 15; // Вариационная маржа
  float avrposnprice = 16; // Эффективная цена позиций
  float positionvalue = 17; // Стоимость позиций
  // Реально начисленная в ходе клиринга вариационная маржа. Отображается с точностью до 2 двух знаков
  // При этом в уже имеющемся поле varmargin транслируется вариационная маржа, рассчитанная с учетом установленных границ изменения цены
  float real_varmargin = 18;
  float total_varmargin = 19; // Суммарная вариационная маржа по итогам основного клиринга начисленная по всем позициям. Отображается с точностью до 2 двух знаков
  // Актуальный статус торговой сессии. Возможные значения:
  // 0 – Не определено; 1 – Основная сессия; 2 – Начался промклиринг; 3 – Завершился промклиринг; 4 – Начался основной клиринг;
  // 5 – Основной клиринг: новая сессия назначена; 6 – Завершился основной клиринг; 7 – Завершилась вечерняя сессия
  int32 session_status = 20;
}

// Позиции по клиентским счетам (фьючерсы)
message FuturesClientHoldings {
  repeated FuturesClientHolding futures_client_holding = 1; // Позиция по клиентским счетам (фьючерсы)
}

// 4.11 Позиция по деньгам
message MoneyLimit {
  string currcode = 1; // Код валюты
  string tag = 2; // Код позиции
  string firmid = 3; // Идентификатор фирмы
  string client_code = 4; // Код клиента
  float openbal = 5; // Входящий остаток
  float openlimit = 6; // Входящий лимит
  float currentbal = 7; // Текущий остаток
  float currentlimit = 8; // Текущий лимит
  float locked = 9; // Заблокировано. Сумма средств, заблокированных под исполнение заявок клиента
  float locked_value_coef = 10; // Стоимость активов в заявках на покупку немаржинальных инструментов
  float locked_margin_value = 11; // Стоимость активов в заявках на покупку маржинальных инструментов
  float leverage = 12; // Плечо
  // Срок расчётов. Возможные значения:
  // - положительные целые числа, начиная с 0, соответствующие срокам расчетов из таблицы "Позиции по деньгам": 0 – T0, 1 – T1, 2 – T2 и т.д.;
  // - отрицательные целые числа – технологические лимиты (используются для внутренней работы системы QUIK)
  int32 limit_kind = 13;
  float wa_position_price = 14; // Средневзвешенная цена приобретения позиции
  float orders_collateral = 15; // Гарантийное обеспечение заявок
  float positions_collateral = 16; // Гарантийное обеспечение позиций
}

// Позиции по деньгам
message MoneyLimits {
