}

// 4.12 Удаление позиции по денежным средствам
message MoneyLimitDelete {
  string currcode = 1; // Код валюты
  string tag = 2; // Код позиции
  string client_code = 3; // Код клиента
  string firmid = 4; // Идентификатор фирмы
  // Срок расчётов. Возможные значения:
  // положительные целые числа, начиная с 0, соответствующие срокам расчетов из таблицы "Позиции по деньгам": 0 – T0, 1 – T1, 2 – T2 и т.д.;
  // отрицательные целые числа – технологические лимиты (используются для внутренней работы системы QUIK)
  int32 limit_kind = 5;
}

// 4.13 Удаление позиции по инструментам
message DepoLimitDelete {
  string sec_code = 1; // Код инструмента
  string trdaccid = 2; // Код торгового счета
  string firmid = 3; // Идентификатор фирмы
  string client_code = 4; // Код клиента
  // Срок расчётов. Возможные значения:
  // положительные целые числа, начиная с 0, соответствующие срокам расчетов из таблицы "Позиции по инструментам": 0 – T0, 1 – T1, 2 – T2 и т.д.;
  // отрицательные целые числа – технологические лимиты (используются для внутренней работы системы QUIK)
  int32 limit_kind = 5;
}

// 4.14 Удаление фьючерсного лимита
message FuturesLimitDelete {
  string firmid = 1; // Идентификатор фирмы
  // Тип лимита. Возможные значения:
  // 0 – Денежные средства; 1 – Залоговые денежные средства; 2 – По совокупным средствам; 3 – Клиринговые денежные средства; 4 – Клиринговые залоговые денежные средства;
  // 5 – Лимит открытых позиций на спотрынке; 6 – Суммарные залоговые средства в иностранной валюте (в рублях); 7 – Залоговые средства в иностранной валюте
  int32 limit_type = 2;
}

// 4.15 Позиция по инструментам
message DepoLimit {
  string sec_code = 1; // Код инструмента
  string trdaccid = 2; // Счет депо
  string firmid = 3; // Идентификатор фирмы
  string client_code = 4; // Код клиента
  float openbal = 5; // Входящий остаток
  float openlimit = 6; // Входящий лимит
  float currentbal = 7; // Текущий остаток
  float currentlimit = 8; // Текущий лимит
  int32 locked_sell = 9; // В продаже. Количество инструментов, заблокированное под исполнение заявок клиента на продажу
  int32 locked_buy = 10; // В покупке. Количество инструментов в активных заявках клиента на покупку
  float locked_buy_value = 11; // Стоимость инструментов, заблокированных под покупку
  float locked_sell_value = 12; // Стоимость инструментов, заблокированных под продажу
  float wa_position_price = 13; // Цена приобретения
  // Валюта, в которой отображается значение цены приобретения инструмента. Для облигаций, цена которых выражена в процентах от номинала, возвращается значение %.
  // Параметр может принимать значение пусто, если в момент запроса данных в терминале отсутствует информация для расчета валюты цены приобретения
  string wa_price_currency = 14;
  // Срок расчётов. Возможные значения:
  // положительные целые числа, начиная с 0, соответствующие срокам расчетов из таблицы "Позиции по инструментам": 0 – T0, 1 – T1, 2 – T2 и т.д.;
  // отрицательные целые числа – технологические лимиты (используются для внутренней работы системы QUIK)
  int32 limit_kind = 15;
}

// Позиции по инструментам
message DepoLimits {
  repeated DepoLimit depo_limit = 1; // Позиция по инструментам
}

// 4.16 Позиция участника по деньгам
message AccountPosition {
  string firmid = 1; // Идентификатор фирмы
  string currcode = 2; // Код валюты
  string tag = 3; // Код позиции
  string description = 4; // Описание
  float openbal = 5; // Входящий остаток
  float currentpos = 6; // Текущий остаток
  float plannedpos = 7; // Плановый остаток
  float limit1 = 8; // Внешнее ограничение по деньгам
  float limit2 = 9; // Внутреннее (собственное) ограничение по деньгам
  int32 orderbuy = 10; // В заявках на продажу
  int32 ordersell = 11; // В заявках на покупку
  int32 netto = 12; // Нетто-позиция
  int32 plannedbal = 13; // Плановая позиция
  float debit = 14; // Дебет
  float credit = 15; // Кредит
  string bank_acc_id = 16; // Идентификатор счета
  float margincall = 17; // Маржинальное требование на начало торгов
  int32 settlebal = 18; // Плановая позиция после проведения расчетов
}

// 4.17 (neg_deals) Заявки на внебиржевые сделки
// 4.18 (neg_trades) Сделки для исполнения

// 4.19 Торговый счет
message TradeAccount {
  string class_codes = 1; // Список кодов классов, разделенных символом |
  string firmid = 2;  // Идентификатор фирмы
  string trdaccid = 3; // Код торгового счета
  string description = 4; // Описание
  int32 fullcoveredsell = 5; // Запрет необеспеченных продаж. Возможные значения: 0 – Нет; 1 – Да
  string main_trdaccid = 6; // Основной торговый счет
  string bankid_t0 = 7; // Расчетная организация по Т0
  string bankid_tplus = 8; // Расчетная организация по Т+
  int32 trdacc_type = 9; // Тип торгового счета
  string depunitid = 10; // Раздел счета Депо
  int32 status = 11; // Статус торгового счета. Возможные значения: 0 – операции разрешены; 1 – операции запрещены
  int32 firmuse = 12; // Тип раздела. Возможные значения: 0 – раздел обеспечения; иначе – для торговых разделов
  string depaccid = 13; // Номер счета депо в депозитарии
  string bank_acc_id = 14; // Код дополнительной позиции по денежным средствам
  int32 flags = 15; // Набор битовых флагов. Возможные значения: бит 0 (0x1) – Торгово-клиринговый счет для рынка депозитов
}

// Торговые счета
message TradeAccounts {
  repeated TradeAccount trade_account = 1; // Торговый счет
}

// 4.20 (neg_deal_reports) Отчет по сделкам для исполнения

// 4.21 Инструмент
message Security {
  string code = 1; // Код инструмента
  string name = 2; // Наименование инструмента
  string short_name = 3; // Короткое наименование инструмента
  string class_code = 4; // Режим торгов
  string class_name = 5; // Наименование режима торгов
  float face_value = 6; // Номинал
  string face_unit = 7; // Валюта номинала
  int32 scale = 8; // Точность (количество значащих цифр после запятой)
  int32 mat_date = 9; // Дата погашения
  int32 lot_size = 10; // Размер лота
  string isin_code = 11; // ISIN
  float min_price_step = 12; // Минимальный шаг цены
  string bsid = 13; // Bloomberg ID
  string cusip_code = 14; // CUSIP
  string stock_code = 15; // StockCode
  float couponvalue = 16; // Размер купона
  string first_currcode = 17; // Код котируемой валюты в паре
  string second_currcode = 18; // Код базовой валюты в паре
  string base_active_classcode = 19; // Режим торгов базового актива
  string base_active_seccode = 20; // Базовый актив
  float option_strike = 21; // Страйк опциона
  int32 qty_multiplier = 22; // Кратность при вводе количества
  string step_price_currency = 23; // Валюта шага цены
  string sedol_code = 24; // SEDOL
  string cfi_code = 25; // CFI
  string ric_code = 26; // RIC
  int32 buybackdate = 27; // Дата оферты
  float buybackprice = 28; // Цена оферты
  int32 list_level = 29; // Уровень листинга
  int32 qty_scale = 30; // Точность количества
  float yieldatprevwaprice = 31; // Доходность по предыдущей оценке
  string regnumber = 32; // Регистрационный номер
  string trade_currency = 33; // Валюта торгов
  int32 second_curr_qty_scale = 34; // Точность количества котируемой валюты
  int32 first_curr_qty_scale = 35; // Точность количества базовой валюты
  float accruedint = 36; // Накопленный купонный доход
  string stock_name = 37; // Код деривативного контракта в формате QUIK
  int32 nextcoupon = 38; // Дата выплаты купона
  int32 couponperiod = 39; // Длительность купона
  string settlecode = 40; // Текущий код расчетов для инструмента
  int32 exp_date = 41; // Дата экспирации
  int32 settle_date = 42; // Дата расчетов
  repeated Leg leg = 43; // Ноги составного инструмента
}

// Нога инструмента
message Leg {
  string classcode = 1; // Режим торгов связанного инструмента
  string seccode = 2; // Код связанного инструмента
  string CFI = 3; // CFI
  int32 ratio_qty = 4; // Количество образования позиции при выполнении операции по связанному инструменту
  string leg_side = 5; // Направление позиции при выполнении операции по связанному инструменту. Возможные значения: buy – покупка; sell – продажа
  int32 settle_date = 6; // Дата расчетов
}

// Инструменты
message Securities {
  repeated Security security = 1; // Инструмент
}

// 4.22 (Свечка графика)

// 4.23 Формат даты и времени, используемый в таблицах
message DateTime {
  int32 mcs = 1; // Микросекунды
  int32 ms = 2; // Миллисекунды
  int32 sec = 3; // Секунды
  int32 min = 4; // Минуты
  int32 hour = 5; // Часы
  int32 day = 6; // День
  int32 week_day = 7; // Номер дня недели. Понедельник = 1, Пятница = 5
  int32 month = 8; // Месяц
  int32 year = 9; // Год
}

// 4.24 Транзакция
message TransReply {
  uint64 trans_id = 1; // Пользовательский идентификатор транзакции
  // Статус транзакции. Возможные значения:
  // 0 – транзакция отправлена серверу;
  // 1 – транзакция получена на сервер QUIK от клиента;
  // 2 – ошибка при передаче транзакции в торговую систему. Так как отсутствует подключение шлюза Московской Биржи, повторно транзакция не отправляется;
  // 3 – транзакция выполнена;
  // 4 – транзакция не выполнена торговой системой. Более подробное описание ошибки отражается в поле "Сообщение";
  // 5 – транзакция не прошла проверку сервера QUIK по каким-либо критериям. Например, проверку на наличие прав у пользователя на отправку транзакции данного типа;
  // 6 – транзакция не прошла проверку лимитов сервера QUIK;
  // 10 – транзакция не поддерживается торговой системой;
  // 11 – транзакция не прошла проверку правильности электронной цифровой подписи;
  // 12 – не удалось дождаться ответа на транзакцию, т.к. истек таймаут ожидания. Может возникнуть при подаче транзакций из QPILE;
  // 13 – транзакция отвергнута, так как ее выполнение могло привести к кросс-сделке (т.е. сделке с тем же самым клиентским счетом);
  // 14 – транзакция не прошла контроль дополнительных ограничений, установленных брокером;
  // 15 – транзакция принята после нарушения дополнительных ограничений, установленных брокером;
  // 16 – транзакция отменена пользователем в ходе проверки дополнительных ограничений, установленных брокером
  int32 status = 2;
  string result_msg = 3; // Сообщение
  DateTime date_time = 4; // Дата и время
  uint64 uid = 5; // Идентификатор  
  int32 flags = 6; // 5.7 Флаги транзакции. бит 20 (0x21) Служебная транзакция. бит 21 (0x22) Транзакция на выставление заявки
  // Параметр заявки, обозначающий флаги. Возможные значения: бит 2 (0x4) (заявка на продажу, иначе – на покупку).
  // Значение параметра применимо только для транзакций с параметром направления операции (купля / продажа), в остальных случаях параметр имеет значение 0
  int32 order_flags = 7;
  uint64 server_trans_id = 8; // Идентификатор транзакции на сервере
  uint64 order_num = 9; // Номер заявки
  float price = 10; // Цена
  int32 quantity = 11; // Количество
  float balance = 12; // Остаток
  string firm_id = 13; // Идентификатор фирмы
  string account = 14; // Торговый счет
  string client_code = 15; // Код клиента
  string brokerref = 16; // Комментарий
  string class_code = 17; // Режим торгов
  string sec_code = 18; // Код инструмента
  string exchange_code = 19; // Биржевой номер заявки
  int32 error_code = 20; // Числовой код ошибки. Значение равно 0, если транзакция выполнена успешно
  int32 error_source = 21; // Источник сообщения. Возможные значения: 1 – Торговая система; 2 – Сервер QUIK; 3 – Библиотека расчёта лимитов; 4 – Шлюз торговой системы
  uint64 first_ordernum = 22; // Номер первой заявки, которая выставлялась при автоматической замене кода клиента. Используется, если на сервере QUIK настроена замена кода клиента для кросс-сделки
  DateTime gate_reply_time = 23; // Дата и время получения шлюзом ответа на транзакцию
  DateTime sent_local_time = 24; // Дата и время отправки транзакции, локальное время клиента в UTC
  DateTime got_local_time = 25; // Дата и время получения ответа на транзакцию, локальное время клиента в UTC
  repeated TransOrder orders = 26; // Заявки. Параметр добавляется в ответ на транзакцию только при наличии двух и более заявок, связанных с транзакцией
}

// Параметры заявки транзакции
message TransOrder {
  uint64 first_ordernum = 1; // Номер первой заявки, которая выставлялась при автоматической замене кода клиента. Используется, если на сервере QUIK настроена замена кода клиента для кросссделки
  uint64 order_num = 2; // Номер заявки
  float price = 3; // Цена
  int32 quantity = 4; // Количество
  float balance = 5; // Остаток
  int32 order_flags = 6; // Флаги. Возможные значения: бит 2 (0x4) (заявка на продажу, иначе – на покупку). Значение параметра применимо только для транзакций с параметром направления операции (купля / продажа), в остальных случаях параметр имеет значение 0
  string firm_id = 7; // Идентификатор фирмы
  string account = 8; // Торговый счет
  string client_code = 9; // Код клиента
  string brokerref = 10; //Комментарий
  string exchange_code = 11; //Биржевой номер заявки
  string sec_code = 12; // Код инструмента
  string class_code = 13; // Режим торгов
}

// 4.25 (ccp_holdings) Обязательства и требования по активам
// 4.26 (rm_holdings) Валюта: обязательства и требования по активам
