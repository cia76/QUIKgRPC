  float visible_repo_value = 66; // Сумма РЕПО видимой части (точность валюты расчетов заявки/инструмента)
  int32 trading_session = 67; // Идентификатор торговой сессии. Возможные значения: 0 – Не определено; 1 – Основная сессия; 2 – Дополнительная сессия; 3 – Итоги дня
  int32 price_entry_type = 68; // Тип ввода значения цены заявки. Возможные значения: 1 – По цене; 2 – По доходности; 3 - По средневзвешенной цене
  string lseccode = 69; // Код инструмента, являющийся приоритетным обеспечением
