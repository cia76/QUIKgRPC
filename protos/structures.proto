  int32 operation_type = 62; // Тип совершаемой операции. Возможные значения: -1 – NOT_DEFINED; 0 – SPOT; 1 – FORWARD; 2 – SWAP; 6 – NDF; 7 – FLEX FORWARD
  int32 qty2 = 63; // Количество второй части операции своп
  float value2 = 64; // Объем второй части операции своп
