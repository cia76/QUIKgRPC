  int32 side_qualifier = 38; // Поле для получения параметров по западным площадкам. Если имеет значение 0, значит значение не задано
  int32 acnt_type = 39; // Поле для получения параметров по западным площадкам. Если имеет значение 0, значит значение не задано
  // Роль в исполнении заявки. Возможные значения:
