syntax = "proto3";

package functions;

option csharp_namespace = "QuikGrpc";

import "structures.proto"; // Структуры данных

// 3. Функции взаимодействия скрипта Lua и Рабочего места QUIK
service InteractionFunctions {
  // 3.1 Функции для обращения к строкам произвольных таблиц QUIK

  // 3.1.1 (getItem) Функция возвращает таблицу Lua, содержащую информацию о данных из строки с номером Index из таблицы с именем TableName
  // 3.1.2 (getOrderByNumber) Функция возвращает таблицу Lua, содержащую описание параметров Таблицы заявок и индекс заявки в хранилище терминала
  // 3.1.3 (getNumberOf) Функция возвращает количество записей в таблице TableName
  // 3.1.4 (SearchItems) Функция позволяет реализовать быструю выборку элементов из хранилища терминала и возвращает таблицу с индексами элементов, удовлетворяющих условию поиска
  // 3.1.5 Таблицы, используемые в функциях getItem, getNumberOf и SearchItems
  // (firms) - Фирмы
  // (classes) - Режимы торгов
  // (securities - Инструменты
  // trade_accounts - Торговые счета
  // client_codes - Коды клиентов
  // all_trades - Обезличенные сделки
  // (account_positions) - Позиции участника по деньгам
  // orders - Заявки
  // (futures_client_holding) - Позиции по клиентским счетам (фьючерсы)
  // (futures_client_limits) - Ограничения по клиентским счетам
  // money_limits - Позиции по деньгам
  // depo_limits - Позиции по инструментам
  // trades - Сделки
  // stop_orders - Стоп-заявки
  // (neg_deals) - Заявки на внебиржевые сделки
  // (neg_trades) - Сделки для исполнения
  // (neg_deal_reports) - Отчеты по сделкам для исполнения
  // (firm_holding) - Позиции участника по инструментам
  // (account_balance) - Позиции участника по торговым счетам
  // (ccp_holdings) - Обязательства и требования по активам
  // (rm_holdings) - Валюта: обязательства и требования по активам

  // Функции для обращения к строкам произвольных таблиц QUIK#

  rpc GetTradeAccounts(Empty) returns (TradeAccounts); // Торговые счета, у которых указаны поддерживаемые классы инструментов
  rpc GetTradeAccount(QuikString) returns (QuikString); // Торговый счет для режима торгов
  rpc GetAllOrders(Empty) returns (Orders); // Все заявки
  rpc GetOrders(ClassSecCode) returns (Orders); // Заявки по инструменту
  rpc GetOrderByNumber(QuikString) returns (Order); // Заявка по номеру
  rpc GetOrderById(OrderByIdRequest) returns (Order); // Заявка по инструменту и коду транзакции заявки
  rpc GetOrderByClassNumber(OrderByClassNumberRequest) returns (Order); // Заявка по режиму торгов и номеру
  rpc GetMoneyLimits(Empty) returns (MoneyLimits); // Все позиции по деньгам
  rpc GetClientCode(Empty) returns (QuikString); // Основной (первый) код клиента
  rpc GetClientCodes(Empty) returns (QuikStrings); // Все коды клиента
  rpc GetAllDepoLimits(Empty) returns (DepoLimits); // Лимиты по всем инструментам
  rpc GetAllDepoLimit(QuikString) returns (DepoLimit); // Лимиты по инструменту
  rpc GetAllTrades(Empty) returns (Trades); // Все сделки
  rpc GetTrades(ClassSecCode) returns (Trades); // Сделки по инструменту
  rpc GetTradesByOrderNumber(QuikString) returns (Trades); // Сделки по номеру заявки
  rpc GetAllStopOrders(Empty) returns (StopOrders); // Все стоп заявки
  rpc GetStopOrders(ClassSecCode) returns (StopOrders); // Стоп заявки по инструменту
  rpc GetAllTrade(Empty) returns (AllTrades); // Все обезличенные сделки
  rpc GetTrade(ClassSecCode) returns (AllTrades); // Обезличенные сделки по инструменту

  // 3.2 Функции для обращения к спискам доступных параметров
  
  rpc GetClassesList(Empty) returns (QuikStrings); // 3.2.1 Функция предназначена для получения списка режимов торгов, переданных с сервера в ходе сеанса связи
  rpc GetClassInfo(QuikString) returns (Class); // 3.2.2 Функция предназначена для получения информации о режиме торгов
  rpc GetClassSecurities(QuikStrings) returns (QuikStrings); // 3.2.3 Функция предназначена для получения списка кодов инструментов для списка режимов торгов, заданного списком кодов
  rpc GetOptionBoard(ClassSecCode) returns (OptionBoard); // QUIK# Доска опционов

  // 3.3 Функция для получения информации по денежным средствам
 
  rpc GetMoney(MoneyRequest) returns (MoneyPositions); // 3.3.1 Функция предназначена для получения информации по денежным позициям  
  rpc GetMoneyEx(MoneyExRequest) returns (MoneyLimits); // 3.3.2 Функция предназначена для получения информации по денежным позициям указанного типа

  // 3.4 Функция для получения позиций по инструментам

  rpc GetDepo(DepoRequest) returns (SecPositions); // 3.4.1 Функция предназначена для получения позиций по инструментам
  rpc GetDepoEx(DepoExRequest) returns (DepoLimits); // 3.4.2 Функция предназначена для получения позиций по инструментам указанного типа

  // 3.5 Функция для получения информации по фьючерсным лимитам

  rpc GetFuturesLimit(FuturesLimitRequest) returns (FuturesLimit); // 3.5.1 Функция предназначена для получения информации по фьючерсным лимитам
  rpc GetFuturesClientLimits(Empty) returns (FuturesLimits); // QUIK# Все фьючерсные лимиты

  // 3.6 Функция для получения информации по фьючерсным позициям

  rpc GetFuturesHolding(FuturesHoldingRequest) returns (FuturesClientHolding); // 3.6.1 Функция предназначена для получения информации по фьючерсным позициям
  rpc GetFuturesHoldings(Empty) returns (FuturesClientHoldings); // QUIK# Все фьючерсные позиции

  // 3.7 Функция для получения информации по инструменту

  rpc GetSecurityInfo(ClassSecCode) returns (Security); // 3.7.1 Функция предназначена для получения информации по инструменту
  rpc GetSecurityInfoBulk(SecurityInfoBulkRequest) returns (Securities); // QUIK# Информация по инструментам
  rpc GetSecurityClass(SecurityClassRequest) returns (QuikString); // QUIK# Режим торгов по коду инструмента из заданных режимов торгов

  // 3.8 Функция для получения даты торговой сессии
  // 3.8.1 (getTradeDate) Возвращает дату текущей торговой сессии

  // 3.9 Функция для получения стакана по указанному режиму торгов и инструменту

  rpc GetQuoteLevel2(ClassSecCode) returns (Quote); // 3.9.1 Функция предназначена для получения стакана по указанному режиму торгов и инструменту

  // 3.10 Функции для работы с графиками
  
  // 3.10.1 (getLinesCount) Функция предназначена для получения количества линий в графике (индикаторе) по выбранному идентификатору
  
  rpc GetNumCandles(QuikString) returns (QuikInt); // 3.10.2 Функция предназначена для получения информации о количестве свечек по выбранному идентификатору
  
  // 3.10.3 (getCandlesByIndex) Функция предназначена для получения информации о свечках по идентификатору (заказ данных для построения графика плагин не осуществляет, поэтому для успешного доступа нужный график должен быть открыт)
  // 3.10.4 (CreateDataSource) Функция предназначена для создания таблицы Lua и позволяет работать со свечками, полученными с сервера QUIK, а также реагировать на их изменение

  rpc GetCandles(CandlesRequest) returns (Candles); // QUIK# Свечи по идентификатору графика
  rpc GetCandlesFromDataSource(CandlesFromDataSourceRequest) returns (Candles); // QUIK# Свечи

  // (subscribe_to_candles) QUIK# Подписка на свечи (реализована в Callback)
  // (is_subscribed) QUIK# Есть ли подписка на свечи
  // (unsubscribe_from_candles) QUIK# Отмена подписки на свечи (реализована в Callback)

  // 3.11 Функции для работы с заявками

  rpc SendTransaction(QuikString) returns (QuikBool); // 3.11.1 Функция предназначена для отправки транзакций в торговую систему

  // 3.11.2 (CalcBuySell) Функция предназначена для расчета максимально возможного количества лотов в заявке

  // 3.12 Функции для получения значений таблицы Текущие торги
  
  rpc GetParamEx(ParamExRequest) returns (ParamExResponse); // 3.12.1 Функция предназначена для получения значений всех параметров биржевой информации из таблицы Текущие торги. С помощью этой функции можно получить любое из значений Таблицы текущих торгов для заданных кодов класса и инструмента
  rpc GetParamEx2(ParamExRequest) returns (ParamExResponse); // 3.12.2 Функция предназначена для получения значений всех параметров биржевой информации из Таблицы текущих торгов с возможностью в дальнейшем отказаться от получения определенных параметров, заказанных с помощью функции ParamRequest
  rpc GetParamEx2Bulk(ParamExBulkRequest) returns (ParamExResponses); // QUIK# Таблица текущих торгов по инструментам с возможностью отказа от получения

  // 3.13 Функции для получения параметров таблицы Клиентский портфель

  rpc GetPortfolioInfo(FirmClientCodeRequest) returns (PortfolioInfo); // 3.13.1 Функция предназначена для получения значений параметров таблицы Клиентский портфель, соответствующих идентификатору участника торгов firmid, коду клиента client_code и сроку расчетов limit_kind со значением 0
  rpc GetPortfolioInfoEx(PortfolioInfoExRequest) returns (PortfolioInfo); // 3.13.2 Функция предназначена для получения значений параметров таблицы Клиентский портфель, соответствующих идентификатору участника торгов firmid, коду клиента client_code и сроку расчетов limit_kind со значением, заданным пользователем.

  // 3.14 Функции для получения параметров таблицы Купить/Продать
  // 3.14.1 (getBuySellInfo) Функция предназначена для получения значений параметров таблицы Купить/Продать
  // 3.14.2 (getBuySellInfoEx) Функция предназначена для получения значений параметров таблицы Купить/Продать

  // 3.15 Функции для работы с таблицами Рабочего места QUIK
  // 3.15.1 (AddColumn) Функция добавляет колонки в таблицу с идентификатором t_id
  // 3.15.2 (AllocTable) Функция создает структуру, описывающую таблицу
  // 3.15.3 (Clear) Функция удаляет содержимое таблицы с идентификатором t_id
  // 3.15.4 (CreateWindow) Функция создает окно таблицы с идентификатором t_id
  // 3.15.5 (DeleteRow) Функция удаления строки с ключом key из таблицы с идентификатором t_id
  // 3.15.6 (DestroyTable) Функция закрывает окно таблицы с идентификатором t_id
  // 3.15.7 (InsertRow) Функция добавляет строку с ключом key в таблицу с идентификатором t_id
  // 3.15.8 (IsWindowClosed) Функция предназначена для определения состояния окна таблицы t_id
  // 3.15.9 (GetCell) Функция возвращает таблицу, содержащую данные из ячейки в строке с ключом key, кодом колонки code в таблице t_id
  // 3.15.10 (GetTableSize) Функция возвращает количество строк rows и столбцов col в таблице с индексом t_id
  // 3.15.11 (GetWindowCaption) Функция получает текущий заголовок окна
  // 3.15.12 (GetWindowRect) Функция возвращает координаты верхнего левого и нижнего правого угла окна, содержащего таблицу t_id
  // 3.15.13 (SetCell) Функция задает значение для ячейки в строке с ключом key, кодом колонки code в таблице t_id
  // 3.15.14 (SetWindowCaption) Функция задает новый заголовок окна
  // 3.15.15 (SetWindowPos) Функция устанавливает положение окна с таблицей t_id. Левый верхний угол в координаты x,y и размеры в dx, dy
  // 3.15.16 (SetTableNotificationCallback) Задание функции обратного вызова для обработки событий в таблице
  // 3.15.17 (RGB) Функция преобразовывает компоненты RGB (red, green, blue) в одно число для дальнейшего использования в функции SetColor
  // 3.15.18 (SetColor) Функция устанавливает цвет ячейки, столбца или строки для таблицы с идентификатором t_id
  // 3.15.19 (Highlight) Функция для подсветки выбранного диапазона ячеек цветом фона и цветом текста в течении указанного времени с плавным «затуханием» для таблицы с идентификатором t_id
  // 3.15.20 (SetSelectedRow) Функция выделяет определенную строку таблицы

  // 3.16 Функции для работы с метками

  rpc AddLabel(LabelRequest) returns (QuikInt); // 3.16.1 Добавляет метку с заданными параметрами
  rpc DelLabel(ChartLabelRequest) returns (QuikBool); // 3.16.2 Удаляет метку с заданными параметрами
  rpc DelAllLabels(QuikString) returns (QuikBool); // 3.16.3 Команда удаляет все метки на диаграмме с указанным графиком
  rpc GetLabelParams(ChartLabelRequest) returns (LabelParams); // 3.16.4 Команда позволяет получить параметры метки
  // 3.16.5 (SetLabelParams) Функция задает параметры для метки с указанным идентификатором

  // 3.17 Функции для заказа стакана котировок
  // 3.17.1 (Subscribe_Level_II_Quotes) Функция заказывает на сервер получение стакана по указанному режиму торгов и инструменту (реализована в Callback)
  // 3.17.2 (Unsubscribe_Level_II_Quotes) Функция отменяет заказ на получение с сервера стакана по указанному режиму торгов и инструменту (реализована в Callback)
  // 3.17.3 (IsSubscribed_Level_II_Quotes) Функция позволяет узнать, заказан ли с сервера стакан по указанному режиму торгов и инструменту

  // 3.18 Функции для заказа параметров Таблицы текущих торгов

  rpc ParamRequest(ParamExRequest) returns (QuikBool); // 3.18.1 Функция заказывает получение параметров Таблицы текущих торгов
  rpc CancelParamRequest(ParamExRequest) returns (QuikBool); // 3.18.2 Функция отменяет заказ на получение параметров Таблицы текущих торгов
  rpc ParamRequestBulk(ParamExBulkRequest) returns (QuikBools); // QUIK# Заказ получения таблицы текущих торгов по инструментам
  rpc CancelParamRequestBulk(ParamExBulkRequest) returns (QuikBools); // QUIK# Отмена заказа получения таблицы текущих торгов по инструментам

  // 3.19 Функции для получения информации по единой денежной позиции

  rpc GetTrdAccByClientCode(FirmClientCodeRequest) returns (QuikString); // 3.19.1 Функция возвращает торговый счет срочного рынка, соответствующий коду клиента фондового рынка с единой денежной позицией
  rpc GetClientCodeByTrdAcc(ClientCodeByTrdAccRequest) returns (QuikString); // 3.19.2 Функция возвращает код клиента фондового рынка с единой денежной позицией, соответствующий торговому счету срочного рынка
  rpc IsUcpClient(FirmClientCodeRequest) returns (QuikBool); // 3.19.3 Функция предназначена для получения признака, указывающего имеет ли клиент единую денежную позицию
}

// Запросы

// 3.3.1 Денежные позиции
message MoneyRequest {
  string client_code = 1; // Код клиента
  string firmid = 2; // Идентификатор фирмы
  string tag = 3; // Идентификатор денежного лимита
  string currcode = 4; // Код валюты. SUR для рублей
}

// 3.3.2 Денежные позиции указанного типа
message MoneyExRequest {
  MoneyRequest money_request = 1; // Запрос денежных позиций
  int32 limit_kind = 2; // Срок расчетов
}

// 3.4.1 Позиции по инструментам
message DepoRequest {
  string client_code = 1; // Код клиента
  string firmid = 2; // Идентификатор фирмы
  string sec_code = 3; // Код инструмента
  string trdaccid = 4; // Торговый счет
}

// 3.4.2 Позиции по инструментам указанного типа
message DepoExRequest {
  string firmid = 1; // Идентификатор фирмы
  string client_code = 2; // Код клиента
  string sec_code = 3; // Код инструмента
  string trdaccid = 4; // Торговый счет
  int32 limit_kind = 5; // Срок расчетов
}

// 3.5.1 Фьючерсные лимиты
message FuturesLimitRequest {
  string firmid = 1; // Идентификатор фирмы
  string  trdaccid = 2; // Торговый счет
  int32 limit_type = 3; // Срок расчетов
  string currcode = 4;  // Код валюты. SUR для рублей
}

// 3.6.1 Фьючерсные позиции
message FuturesHoldingRequest {
  string firmid = 1; // Идентификатор фирмы
  string  trdaccid = 2; // Торговый счет
  string sec_code = 3; // Код инструмента
  int32  type = 4; // Тип лимита. Возможные значения: 0 – не определён; 1 – основной счет; 2 – клиентские и дополнительные счета; 4 – все счета торг. членов
}

// 3.12.1 / 3.18.1 / 3.18.2 Текущие торги
message ParamExRequest {
  ClassSecCode class_sec_code = 1; // Режим торгов и инструмент
  string param_name = 2; // Название параметра
}

// 3.13.1 / 3.19.1 / 3.19.3 Идентификатор фирмы c кодом клиента
message FirmClientCodeRequest {
  string firmid = 1; // Идентификатор фирмы
  string client_code = 2; // Код клиента
}

// 3.13.2 Клиентский портфель по сроку расчетов
message PortfolioInfoExRequest {
  string firmid = 1; // Идентификатор фирмы
  string client_code = 2; // Код клиента
  int32 limit_kind = 3; // Срок расчетов
}

// 3.16.1 Параметры метки на графике
message LabelRequest {
  float price = 1; // Значение параметра на оси Y (цена), к которому будет привязана метка
  int32 cur_date = 2; // Дата в формате ГГГГММДД, к которой привязана метка
  int32 cur_time = 3; // Время в формате ЧЧММСС, к которому будет привязана метка
  int32 qty = 4; // Текст всплывающей подсказки (объем в лотах)
  string path = 5; // Путь к картинке, которая будет отображаться в качестве метки (пустая строка, если картинка не требуется). Используются картинки формата *.bmp, *.jpeg
  string chart_tag = 6; // Тег графика, к которому привязывается метка
  string alignment = 7; // Расположение картинки относительно текста (возможно 4 варианта: LEFT, RIGHT, TOP, BOTTOM)
  int32 background = 8; // Прозрачность фона картинки. Возможные значения: 0 – прозрачность отключена, 1 – прозрачность включена
}

// 3.16.2 / 3.16.4 Метка на графике
message ChartLabelRequest {
  string chart_tag = 1; // Тег графика, к которому привязывается метка
  int32 label_id = 2; // Идентификатор метки
}

// 3.19.2 Код клиента фондового рынка с единой денежной позицией по торговому счету срочного рынка
message ClientCodeByTrdAccRequest{
  string firmid = 1; // Идентификатор фирмы
  string  trade_account_id = 2; // Торговый счет
}

// QUIK# Заявка по режиму торгов и номеру
message OrderByClassNumberRequest {
  string class_code = 1; // Код режима торгов
  string order_id = 2; // Номер заявки
}

// QUIK# Информация по инструментам
message SecurityInfoBulkRequest {
  repeated ClassSecCode class_sec_code = 1; // Режим торгов и инструмент
}

// QUIK# Режим торгов по коду инструмента из заданных режимов торгов
message SecurityClassRequest {
  repeated string classes_list = 1;  // Коды режимов торгов (class_codes)
  string sec_code = 2; // Инструмент
}

// QUIK# Свечи по идентификатору графика
message CandlesRequest {
  string tag = 1; // Строковый идентификатор графика или индикатора
  int32 line = 2; // Номер линии графика или индикатора
  int32 first_candle = 3; // Номер первой свечи
  int32 count = 4; // Кол-во свечей. 0 - все
}

// QUIK# Свечи
message CandlesFromDataSourceRequest {
  ClassSecCode class_sec_code = 1; // Режим торгов и инструмент
  TimeFrame interval = 2; // Количество в минутах (временной интервал)
  string param = 3; // Если параметр не задан ("-"), то заказываются данные на основании Таблицы обезличенных сделок, если задан – данные по этому параметру
  int32 count = 4; // Кол-во свечей. 0 - все
}

// QUIK# Заявки по инструменту и коду транзакции заявки
message OrderByIdRequest {
  ClassSecCode class_sec_code = 1; // Режим торгов и инструмент
  string order_trans_id = 2; // Код транзакции заявки
}

// QUIK# Параметры текущих торгов по инструментам
message ClassSecCodeParam {
  string class_code = 1; // Код режима торгов
  string sec_code = 2; // Инструмент
  string param_name = 3; // Параметр
}

message ParamExBulkRequest {
  repeated ClassSecCodeParam class_sec_code_param = 1; // Коды режимов торгов/инструментов/параметров
}

// Ответы

// 3.12.1 Текущие торги
message ParamExResponse {
  string param_type = 1; // Тип данных параметра, используемый в таблице «Текущие торги». Возможные значения: 1 – DOUBLE; 2 – LONG; 3 – CHAR; 4 – перечислимый тип; 5 – время; 6 – дата
  string param_value = 2; // Значение параметра. Для param_type = 3 значение параметра равно 0, в остальных случаях – числовое представление. Для перечислимых типов значение равно порядковому значению перечисления
  string param_image = 3; // Строковое значение параметра, аналогичное его представлению в таблице. В строковом представлении учитываются разделители разрядов, разделители целой и дробной части. Для перечислимых типов выводятся соответствующие им строковые значения.
  string result = 4; // Результат выполнения операции. Возможные значения: 0 – ошибка; 1 – параметр найден
}

// 3.13.1 Клиентский портфель
message PortfolioInfo {
  // Признак использования схемы кредитования с контролем текущей стоимости активов (Тип клиента). Возможные значения:
  // МЛ – используется схема ведения позиции по плечу, плечо рассчитано по значению Входящего лимита,
  // МП - используется схема ведения позиции по плечу, плечо указано явным образом,
  // МОП – используется схема ведения позиции лимит на открытую позицию;
  // МД – используется схема ведения позиции по дисконтам;
  // С – используется схема ведения позиций срочный рынок. Для клиентов срочного рынка без единой денежной позиции;
  // <пусто> – используется схема ведения позиции по лимитам
  string is_leverage = 1;
  string in_assets = 2; // Оценка собственных средств клиента до начала торгов (Вход. активы)
  string leverage = 3; // Плечо. Если не задано явно, то отношение Входящего лимита к Входящим активам (Плечо)
  string open_limit = 4; // Оценка максимальной величины заемных средств до начала торгов (Вход. лимит)
  string val_short = 5; // Оценка стоимости коротких позиций. Значение всегда отрицательное (Шорты)
  string val_long = 6; // Оценка стоимости длинных позиций (Лонги)
  string val_long_margin = 7; // Оценка стоимости длинных позиций по маржинальным инструментам, принимаемым в обеспечение (Лонги МО)
  string val_long_asset = 8; // Оценка стоимости длинных позиций по немаржинальным инструментам, принимаемым в обеспечение (Лонги О)
  string assets = 9; // Оценка собственных средств клиента по текущим позициям и ценам (Тек. активы)
  string cur_leverage = 10; // Текущее плечо (Тек.Плечо)
  string margin = 11; // Уровень маржи, в процентах (Ур. Маржи)
  string lim_all = 12; // Текущая оценка максимальной величины заемных средств (Тек. Лимит)
  string av_lim_all = 13; // Оценка величины заемных средств, доступных для дальнейшего открытия позиций (ДостТекЛимит)
  string locked_buy = 14; // Оценка стоимости активов в заявках на покупку (Блок. покупка)
  string locked_buy_margin = 15; // Оценка стоимости активов в заявках на покупку маржинальных инструментов, принимаемых в обеспечение (Блок. пок. маржин.)
  string locked_buy_asset = 16; // Оценка стоимости активов в заявках на покупку немаржинальных инструментов, принимаемых в обеспечение (Блок.пок. обесп.)
  string locked_sell = 17; // Оценка стоимости активов в заявках на продажу маржинальных инструментов (Блок. продажа)
  string locked_value_coef = 18; // Оценка стоимости активов в заявках на покупку немаржинальных инструментов (Блок. пок. немарж.)
  string in_all_assets = 19; // Оценка стоимости всех позиций клиента в ценах закрытия предыдущей торговой сессии, включая позиции по немаржинальным инструментам (ВходСредства)
  string all_assets = 20; // Текущая оценка стоимости всех позиций клиента (ТекСредства)
  string profit_loss = 21; // Абсолютная величина изменения стоимости всех позиций клиента (Прибыль/убытки)
  string rate_change = 22; // Относительная величина изменения стоимости всех позиций клиента (ПроцИзмен)
  string lim_buy = 23; // Оценка денежных средств, доступных для покупки маржинальных инструментов (На покупку)
  string lim_sell = 24; // Оценка стоимости маржинальных инструментов, доступных для продажи (На продажу)
  string lim_non_margin = 25; // Оценка денежных средств, доступных для покупки немаржинальных инструментов (НаПокупНеМаржин)
  string lim_buy_asset = 26; // Оценка денежных средств, доступных для покупки инструментов, принимаемых в обеспечение (НаПокупОбесп)
  string val_short_net = 27; // Оценка стоимости коротких позиций. При расчете не используется коэффициент дисконтирования (Шорты (нетто))
  string val_long_net = 28; // Оценка стоимости длинных позиций. При расчете не используется коэффициент дисконтирования (Лонги (нетто))
  string total_money_bal = 29; // Сумма остатков по денежным средствам по всем лимитам, без учета средств, заблокированных под исполнение обязательств, выраженная в выбранной валюте расчета (Сумма ден. остатков)
  string total_locked_money = 30; // Cумма заблокированных средств со всех денежных лимитов клиента, пересчитанная в валюту расчетов через кросс-курсы на сервере (Суммарно заблок.)
  string haircuts = 31; // Сумма дисконтов стоимости длинных (только по инструментам обеспечения) и коротких позиций по инструментам, дисконтов корреляции между инструментами, а также дисконтов на задолженности по валютам, не покрытые обеспечением по инструментам в этих же валютах (Сумма дисконтов)
  string assets_without_hc = 32; // Суммарная величина денежных остатков, стоимости длинных позиций по инструментам обеспечения и стоимости коротких позиций, без учета дисконтирующих коэффициентов, без учета неттинга стоимости инструментов в рамках объединенной позиции по инструментам и без учета корреляции между инструментами (ТекАктБезДиск)
  string status_coef = 33; // Отношение суммы дисконтов к текущим активам без учета дисконтов (Статус счета)
  string varmargin = 34; // Текущая вариационная маржа по позициям клиента, по всем инструментам (Вариац. маржа)
  string go_for_positions = 35; // Размер денежных средств, уплаченных под все открытые позиции на срочном рынке (ГО поз.)
  string go_for_orders = 36; // Оценка стоимости активов в заявках на срочном рынке (ГО заяв.)
  string rate_futures = 37; // Отношение ликвидационной стоимости портфеля к ГО по срочному рынку (Активы/ГО)
  string is_qual_client = 38; // Признак квалифицированного клиента, которому разрешено кредитование заемными средствами с плечом 1:3. Возможные значения: ПовышУрРиска – квалифицированный, <пусто> – нет (ПовышУрРиска)
  string is_futures = 39; // Счет клиента на срочном рынке Московской Биржи, в случае наличия объединенной позиции, иначе поле остается пустым (Сроч. счет)
  string curr_tag = 40; // Актуальные текущие параметры расчета для данной строки в формате <Валюта>-<Код позиции>. Пример: SUR-EQTV (Парам. расч.)
  string init_margin = 41; // Значение начальной маржи. Заполняется для клиентов типа МД (Нач.маржа)
  string min_margin = 42; // Значение минимальной маржи. Заполняется для клиентов типа МД (Мин.маржа)
  string corrected_margin = 43; // Значение скорректированной маржи. Заполняется для клиентов типа МД (Скор.маржа)
  string client_type = 44; // Тип клиента (Тип клиента)
  string portfolio_value = 45; // Стоимость портфеля. Для клиентов типа МД возвращается значение для строк с максимальным сроком расчетов limit_kind (Стоимость портфеля)
  string start_limit_open_pos = 46; // Лимит открытых позиций на начало дня (ЛимОткрПозНачДня)
  string total_limit_open_pos = 47; // Лимит открытых позиций (ЛимОткрПоз)
  string limit_open_pos = 48; // Планируемые чистые позиции (ПланЧистПоз)
  string used_lim_open_pos = 49; // Текущие чистые позиции (ТекЧистПоз)
  string acc_var_margin = 50; // Накопленная вариационная маржа (НакопВарМаржа)
  string cl_var_margin = 51; // Вариационная маржа по итогам промклиринга (ВарМаржаПромклир.)
  string opt_liquid_cost = 52; // Ликвидационная стоимость опционов (ЛиквСтоимОпционов)
  string fut_asset = 53; // Сумма оценки средств клиента на срочном рынке (СумАктивовНаСрчРынке)
  string fut_total_asset = 54; // Сумма оценки собственных средств клиента на фондовом и срочном рынках (ПолнСтоимостьПортфеля)
  string fut_debt = 55; // Текущая задолженность на срочном рынке (ТекЗадолжНаСрчРынке)
  string fut_rate_asset = 56; // Достаточность средств (Дост. Средств)
  string fut_rate_asset_open = 57; // Достаточность средств (под открытые позиции) (Дост. Средств (ОткрПоз))
  string fut_rate_go = 58; // Коэффициент ликвидности ГО (КоэффЛикв ГО)
  string planed_rate_go = 59; // Ожидаемый коэффициент ликвидности ГО (Ожид. КоэффЛикв ГО)
  string cash_leverage = 60; // Cash Leverage (Cash Leverage)
  string fut_position_type = 61; // Тип позиции на срочном рынке. Возможные значения: 0 – нет позиции; 1 – фьючерсы; 2 – опционы; 3 – фьючерсы и опционы (ТипПозНаСрчРынке)
  string fut_accured_int = 62; // Накопленный доход с учетом премии по опционам и биржевым сборам (НакопДоход)
  string rcv1 = 63; // Норматив покрытия риска 1. Рассчитывается как разница параметров Стоимость портфеля и Начальная маржа. Для клиентов типа МД и МД+ (НПР1)
  string rcv2 = 64; // Норматив покрытия риска 2. Рассчитывается как разница параметров Стоимость портфеля и Минимальная маржа. Для клиентов типа МД и МД+ (НПР2)
  string demand = 65; // Требование, если стоимость портфеля меньше стоимости начальной маржи, то считается как разность начальной маржи и портфеля, иначе 0. Заполняется для клиентов типа МД (Требование)
  string current_bal = 66; // Сумма текущих остатков с денежных лимитов клиента
  string open_pos = 67; // Оценка открытых позиций клиента с учетом активных заявок. Заполняется для клиентов типа МП
  string money_locked = 68; // Сумма блокировок по активным заявкам с денежных лимитов
  string is_marginal = 69; // 1 для клиентов типа МЛ (тип кредитования по лимитам)
  string fundslevel = 70; // Уровень достаточности средств (УДС). Рассчитывается только для клиентов типа МД и МД+, в остальных случаях принимает значение 9.99 (УДС)
}

// 3.16.4 Параметры метки
message LabelParams {
  string text = 1; // Подпись метки (если подпись не требуется, то пустая строка)
  string image_path = 2; // Путь к картинке, которая будет отображаться в качестве метки (пустая строка, если картинка не требуется). Используются картинки формата *.bmp, *.jpeg
  string alignment = 3; // Расположение картинки относительно текста (возможно 4 варианта: LEFT, RIGHT, TOP, BOTTOM)
  string yvalue = 4; // Значение параметра на оси Y, к которому будет привязана метка
  string date = 5; // Дата в формате ГГГГММДД, к которой привязана метка
  string time = 6; // Время в формате ЧЧММСС, к которому будет привязана метка
  string r = 7; // Красная компонента цвета в формате RGB. Число в интервале [0;255]
  string g = 8; // Зеленая компонента цвета в формате RGB. Число в интервале [0;255]
  string b = 9; // Синяя компонента цвета в формате RGB. Число в интервале [0;255]
  string transparency = 10; // Прозрачность метки в процентах. Значение должно быть в промежутке [0; 100]
  string transparent_background = 11; // Прозрачность фона картинки. Возможные значения: 0 – прозрачность отключена, 1 – прозрачность включена
  string font_face_name = 12; // Название шрифта (например Arial)
  string font_height = 13; // Размер шрифта
  string hint = 14; // Текст всплывающей подсказки
}

// QUIK# Опцион
message Option {
  string code = 1;
  string Name = 2;
  int32 DAYS_TO_MAT_DATE = 3;
  float BID = 4;
  float OFFER = 5;
  string OPTIONBASE = 6;
  string OPTIONTYPE = 7;
  string Longname = 8;
  string shortname = 9;
  float Volatility = 10;
  float Strike = 11;
}

// QUIK# Доска опционов
message OptionBoard {
  repeated Option option = 1; // Опцион
}

// QUIK# Текущие торги
message ParamExResponses {
  repeated ParamExResponse param_ex_response = 1; // Текущие торги
}
